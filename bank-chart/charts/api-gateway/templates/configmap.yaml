apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-config
data:
  application.yml: |
    spring:
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: ${AUTH_SERVER_URL}/realms/bank
      cloud:
        gateway:
          server:
            webflux:
              routes:
                - id: account-service
                  uri: ${ACCOUNT_SERVICE_URL}
                  predicates:
                    - Path=/account/**
                  filters:
                    - name: JwtTokenRelay
                - id: cash-service
                  uri: ${CASH_SERVICE_URL}
                  predicates:
                    - Path=/cash/**
                  filters:
                    - name: JwtTokenRelay
                - id: transfer-service
                  uri: ${TRANSFER_SERVICE_URL}
                  predicates:
                    - Path=/transfer/**
                  filters:
                    - name: JwtTokenRelay
    management:
      tracing:
        export:
          zipkin:
            endpoint: {{ .Values.global.zipkin.endpoint }}
        sampling:
          probability: 1
      endpoints:
        web:
          exposure:
            include: health, metrics, prometheus
    logging:
      level:
        com.tarasov.bank: INFO