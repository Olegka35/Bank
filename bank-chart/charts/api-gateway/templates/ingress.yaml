{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
{{- range .Values.ingress.services }}
          - path: {{ .path }}(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: {{ .name }}
                port:
                  number: {{ .port }}
{{- end }}
{{- end }}
