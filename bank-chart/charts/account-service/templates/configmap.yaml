apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-config
data:
  application.yml: |
    spring:
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: ${AUTH_SERVER_URL}/realms/bank
          client:
            provider:
              keycloak:
                issuer-uri: ${AUTH_SERVER_URL}/realms/bank
            registration:
              account-service:
                provider: keycloak
                authorization-grant-type: client_credentials
                client-id: account-service
                client-secret: ${ACCOUNT_SERVICE_SECRET}
      datasource:
        url: ${ACCOUNT_DB_URL}
        username: ${ACCOUNT_DB_USERNAME}
        password: ${ACCOUNT_DB_PASSWORD}
      jpa:
        show-sql: true
      kafka:
        bootstrap-servers: bank-chart-kafka-broker-0.bank-chart-kafka-headless:9092,bank-chart-kafka-broker-1.bank-chart-kafka-headless:9092
        producer:
          key-serializer: org.apache.kafka.common.serialization.StringSerializer
          value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
          retries: {{ .Values.global.notifications.retry.amount }}
          acks: all
          properties:
            enable.idempotence: true
            retry.backoff.ms: {{ .Values.global.notifications.retry.backoff }}