keycloak:
  image:
    registry: docker.io
    repository: keycloak/keycloak
    tag: 26.5.2
  adminUser: admin
  adminPassword: admin
  adminRealm: bank

frontend-ui:
  replicaCount: 2
  externalPort: 30081
  image:
    tag: "1.0.1"

global:
  security:
    allowInsecureImages: true
  notifications:
    retry:
      amount: 3
      backoff: 1000
  zipkin:
    endpoint: http://bank-chart-zipkin:9411/api/v2/spans

kafka:
  broker:
    replicaCount: 2

zipkin:
  service:
    type: NodePort

prometheus:
  server:
    service:
      type: NodePort